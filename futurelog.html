<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Future Log">
<title>Future Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root {
  --bg:        #dedad4;
  --sheet:     #ffffff;
  --ink:       #141210;
  --ink2:      #2c2a27;
  --ink3:      #4a4742;
  --muted:     #8a8782;
  --faint:     #c8c5c0;
  --rule:      rgba(20,18,16,0.11);
  --rule-s:    rgba(20,18,16,0.20);
  --red:       #8b2c2c;
  --shadow:    0 1px 3px rgba(0,0,0,0.07), 0 4px 18px rgba(0,0,0,0.07);
  --cell-min:  320px;
  --safe-top:  env(safe-area-inset-top,0px);
  --safe-bot:  env(safe-area-inset-bottom,0px);
}
[data-dark] {
  --bg:     #161411;
  --sheet:  #1f1d19;
  --ink:    #ede8df;
  --ink2:   #cec9bf;
  --ink3:   #9a9389;
  --muted:  #6a6460;
  --faint:  #3c3830;
  --rule:   rgba(237,232,223,0.07);
  --rule-s: rgba(237,232,223,0.13);
  --red:    #c47a6a;
  --shadow: 0 1px 4px rgba(0,0,0,0.3),0 4px 20px rgba(0,0,0,0.25);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  font-family:'DM Mono',monospace;
  background:var(--bg);color:var(--ink);
  height:100vh;height:-webkit-fill-available;
  overflow:hidden;position:fixed;width:100%;
  transition:background .25s;
}
#app{display:flex;flex-direction:column;height:100%;height:-webkit-fill-available;}

/* ── TOP BAR ── */
#topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(var(--safe-top) + 10px) 14px 10px;
  background:var(--bg);z-index:30;flex-shrink:0;
  transition:background .25s;
}
.wordmark{
  font-family:'DM Mono',monospace;font-size:10px;font-weight:400;
  letter-spacing:.28em;text-transform:uppercase;color:var(--ink3);text-decoration:none;
}
.tb-r{display:flex;gap:5px;align-items:center;}
.tb-btn{
  height:28px;padding:0 10px;
  border:.5px solid var(--rule-s);border-radius:2px;background:transparent;
  font-family:'DM Mono',monospace;font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--ink3);cursor:pointer;transition:all .12s;
}
.tb-btn:active{background:var(--rule);}
.tb-btn.ink{background:var(--ink);color:var(--bg);border-color:var(--ink);}
.tb-btn.ink:active{opacity:.85;}
.dark-btn{
  width:28px;height:28px;border:.5px solid var(--rule-s);border-radius:50%;
  background:var(--sheet);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:12px;transition:all .2s;flex-shrink:0;
}
.dark-btn:active{transform:scale(.9);}

/* ── PAGE DOTS ── */
#page-nav{
  display:flex;align-items:center;justify-content:center;
  gap:7px;padding:4px 14px 8px;flex-shrink:0;
}
.pdot{width:5px;height:5px;border-radius:50%;background:var(--faint);cursor:pointer;transition:all .2s;}
.pdot.on{background:var(--ink3);transform:scale(1.3);}

/* ── PAGES TRACK ── */
#pages-track{flex:1;overflow:hidden;position:relative;min-height:0;}
#pages-slider{display:flex;height:100%;transition:transform .38s cubic-bezier(.4,0,.2,1);will-change:transform;}
.log-page{
  flex-shrink:0;height:100%;
  overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;
  padding:0 10px calc(var(--safe-bot) + 16px);
}

/* ── SHEET ── */
.sheet{
  background:var(--sheet);border-radius:2px;box-shadow:var(--shadow);
  position:relative;overflow:hidden;transition:background .25s,box-shadow .25s;
}
.sheet::after{
  content:'';position:absolute;inset:0;pointer-events:none;opacity:.015;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:180px;z-index:0;
}

/* ── TITLE ROW ── */
.title-row{
  display:flex;align-items:baseline;justify-content:flex-end;
  padding:22px 24px 14px;border-bottom:.5px solid var(--rule-s);
  position:relative;z-index:1;gap:8px;
}
.title-lbl{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);}
.title-inp{
  border:none;outline:none;border-bottom:.5px solid var(--rule-s);
  padding:1px 0 2px 4px;
  font-family:'DM Mono',monospace;font-size:11px;font-weight:400;letter-spacing:.06em;
  color:var(--ink);background:transparent;width:180px;transition:color .25s;
}
.title-inp::placeholder{color:var(--faint);font-style:italic;}

/* ── GRID ── */
.month-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  /* Row heights are managed entirely by JS ResizeObserver sync */
  align-items:stretch;
  position:relative;z-index:1;
}

/* ── CELL ── */
.month-cell{
  border-right:.5px solid var(--rule-s);
  border-bottom:.5px solid var(--rule-s);
  padding:16px 18px 16px;
  /* minimum height matches PDF proportions */
  min-height:var(--cell-min);
  display:flex;flex-direction:column;
  position:relative;
}
/* right column: no right border */
.month-cell:nth-child(2n){border-right:none;}
/* last row: no bottom border (applied via JS on last pair) */
.month-cell.last-row{border-bottom:none;}

/* ── MONTH HEADER ── */
.month-hdr{
  display:flex;align-items:baseline;gap:6px;
  margin-bottom:12px;padding-bottom:7px;
  border-bottom:.5px solid var(--rule-s);flex-shrink:0;
}
.month-lbl{
  font-family:'DM Mono',monospace;font-size:7.5px;
  letter-spacing:.22em;text-transform:uppercase;color:var(--muted);flex-shrink:0;
}
.month-inp{
  border:none;outline:none;
  font-family:'DM Mono',monospace;font-size:10px;font-weight:500;
  letter-spacing:.08em;text-transform:uppercase;
  color:var(--ink);background:transparent;
  flex:1;min-width:0;
  border-bottom:.5px solid transparent;padding:1px 2px;
  transition:border-color .15s,color .25s;
}
.month-inp:focus{border-bottom-color:var(--rule-s);}
.month-inp::placeholder{color:var(--faint);font-style:italic;text-transform:none;font-weight:300;}

/* ── ITEMS LIST ── */
.items-ul{list-style:none;padding:0;margin:0;flex:1;}
.item-li{
  display:flex;align-items:flex-start;gap:7px;padding:3px 0;
  animation:iIn .18s ease;
}
@keyframes iIn{from{opacity:0;transform:translateX(-3px);}to{opacity:1;}}

.bullet-wrap{
  flex-shrink:0;width:14px;height:14px;margin-top:3px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.bdot{width:3px;height:3px;border-radius:50%;background:var(--ink3);transition:all .18s;}
.item-li.done .bdot{background:var(--faint);transform:scale(.6);}

/* Entry body text: Crimson Pro */
.item-ta{
  flex:1;border:none;outline:none;background:transparent;
  font-family:'Crimson Pro',Georgia,serif;
  font-size:13px;line-height:1.6;color:var(--ink2);
  resize:none;padding:1px 0;width:100%;overflow:hidden;transition:color .25s;
}
.item-li.done .item-ta{color:var(--faint);text-decoration:line-through;text-decoration-color:var(--faint);}
.item-ta::placeholder{color:var(--faint);font-style:italic;}

.del-btn{
  flex-shrink:0;width:14px;height:14px;border:none;background:none;
  color:var(--muted);font-size:12px;cursor:pointer;
  opacity:0;transition:opacity .15s;margin-top:3px;
  display:flex;align-items:center;justify-content:center;line-height:1;
  font-family:'DM Mono',monospace;
}
.item-li:hover .del-btn{opacity:1;}

/* ── ADD ENTRY BUTTON ──
   Always visible (low opacity) so it's tappable on mobile.
   Full opacity on cell focus/hover.                         */
.add-btn{
  display:flex;align-items:center;gap:5px;
  margin-top:10px;padding:4px 0;
  border:none;background:none;cursor:pointer;
  opacity:.35;                  /* always visible */
  transition:opacity .18s;
  flex-shrink:0;align-self:flex-start;
}
.month-cell:hover .add-btn,
.month-cell:focus-within .add-btn{opacity:1;}
.add-plus{font-family:'DM Mono',monospace;font-size:13px;color:var(--faint);line-height:1;}
.add-txt{font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);}

/* ── PAGE NUMBER ── */
.pg-num{
  text-align:right;padding:10px 22px 14px;
  font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.1em;
  color:var(--faint);border-top:.5px solid var(--rule);
  position:relative;z-index:1;
}

/* ── NEW PAGE MODAL ── */
.modal-bg{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.4);z-index:80;
  align-items:flex-end;justify-content:center;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
.modal-bg.open{display:flex;}
.bottom-sheet{
  background:var(--sheet);width:100%;max-width:580px;
  border-radius:12px 12px 0 0;
  padding:8px 0 calc(var(--safe-bot) + 16px);
  animation:slideUp .28s cubic-bezier(.22,.68,0,1.2);
  transition:background .25s;
}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.bs-handle{width:32px;height:3px;border-radius:2px;background:var(--faint);margin:8px auto 16px;}

/* new page form */
.bs-body{padding:0 20px 4px;}
.bs-title{
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--muted);margin-bottom:16px;
}
.field-row{margin-bottom:14px;}
.field-lbl{
  font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.15em;
  text-transform:uppercase;color:var(--muted);margin-bottom:6px;
}
.field-inp, .field-sel{
  width:100%;padding:10px 12px;
  border:.5px solid var(--rule-s);border-radius:2px;
  background:var(--bg);
  font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.04em;
  color:var(--ink);outline:none;transition:border-color .15s;
  -webkit-appearance:none;appearance:none;
}
.field-inp:focus,.field-sel:focus{border-color:var(--ink3);}
.field-inp::placeholder{color:var(--faint);font-style:italic;}

.bs-btn{
  width:100%;margin-top:8px;padding:13px;
  border:none;border-radius:2px;
  background:var(--ink);color:var(--bg);
  font-family:'DM Mono',monospace;font-size:9.5px;letter-spacing:.12em;
  text-transform:uppercase;cursor:pointer;transition:opacity .15s;
}
.bs-btn:active{opacity:.8;}

/* actions list (··· sheet) */
.a-item{display:flex;align-items:center;gap:12px;padding:13px 18px;cursor:pointer;transition:background .1s;}
.a-item:active{background:var(--rule);}
.a-ico{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);width:18px;text-align:center;}
.a-lbl{font-family:'DM Mono',monospace;font-size:10.5px;letter-spacing:.06em;color:var(--ink2);}
.a-lbl.danger{color:var(--red);}
.a-div{height:.5px;background:var(--rule);margin:3px 0;}

/* ── SEARCH ── */
#search-ov{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.18);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  z-index:100;flex-direction:column;
  padding:calc(var(--safe-top) + 16px) 16px calc(var(--safe-bot) + 16px);
}
#search-ov.open{display:flex;}
.s-close{font-family:'DM Mono',monospace;font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);text-align:right;margin-bottom:14px;cursor:pointer;}
.s-box{background:var(--sheet);border:.5px solid var(--rule-s);border-radius:2px;display:flex;align-items:center;gap:10px;padding:11px 14px;margin-bottom:16px;box-shadow:var(--shadow);}
.s-icon{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}
#s-field{flex:1;border:none;outline:none;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.04em;color:var(--ink);background:transparent;}
#s-field::placeholder{color:var(--faint);font-style:italic;}
#s-results{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.s-res{padding:11px 0;border-bottom:.5px solid var(--rule);cursor:pointer;transition:padding-left .12s;}
.s-res:active{padding-left:5px;}
.s-meta{font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;display:flex;gap:7px;flex-wrap:wrap;}
.s-text{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink2);line-height:1.55;letter-spacing:.02em;}
mark{background:rgba(139,44,44,.12);color:var(--red);border-radius:2px;padding:0 1px;}
.s-empty{text-align:center;padding:36px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.06em;color:var(--muted);}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:calc(var(--safe-bot) + 20px);left:50%;
  transform:translateX(-50%) translateY(6px);
  background:var(--ink);color:var(--bg);
  font-family:'DM Mono',monospace;font-size:9.5px;letter-spacing:.07em;text-transform:uppercase;
  padding:8px 16px;border-radius:20px;
  opacity:0;transition:all .22s ease;z-index:200;white-space:nowrap;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ════════════════════
   PRINT  8.5 × 11
   ════════════════════ */
@media print{
  @page{size:8.5in 11in;margin:.6in .65in;}
  body{position:static;overflow:visible;height:auto;background:white!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  #app{height:auto;overflow:visible;display:block;}
  #topbar,#page-nav,.dark-btn,.add-btn,.del-btn{display:none!important;}
  #pages-track{overflow:visible;height:auto;}
  #pages-slider{transform:none!important;flex-direction:column;width:100%!important;height:auto;}
  .log-page{width:100%!important;height:auto;overflow:visible;padding:0;page-break-after:always;break-after:page;}
  .log-page:last-child{page-break-after:avoid;break-after:avoid;}
  .sheet{box-shadow:none;border-radius:0;min-height:auto;}
  .month-grid{display:grid;grid-template-columns:1fr 1fr;}
  .month-cell{break-inside:auto;min-height:0;border-color:#ccc!important;}
  .month-hdr{break-after:avoid;}
  .item-li{break-inside:avoid;}
  .print-rpt{display:block!important;}
}
</style>
</head>

<div id="app">
  <div id="topbar">
    <a class="wordmark" href="index.html">Future Log</a>
    <div class="tb-r">
      <button class="tb-btn" onclick="openSearch()">Search</button>
      <button class="tb-btn" onclick="window.print()">Print</button>
      <button class="tb-btn" onclick="openActions()">· · ·</button>

      <div class="dark-btn" id="dark-btn" onclick="toggleDark()">☽</div>
    </div>
  </div>
  <div id="page-nav"></div>
  <div id="pages-track">
    <div id="pages-slider"></div>
  </div>
</div>

<!-- NEW PAGE MODAL -->
<div class="modal-bg" id="new-page-modal" onclick="if(event.target===this)closeNewPage()">
  <div class="bottom-sheet">
    <div class="bs-handle"></div>
    <div class="bs-body">
      <div class="bs-title">New page</div>
      <div class="field-row">
        <div class="field-lbl">Page title (optional)</div>
        <input type="text" class="field-inp" id="np-title" placeholder="e.g. 2026 Goals…">
      </div>
      <div class="field-row">
        <div class="field-lbl">Starting month</div>
        <select class="field-sel" id="np-month">
          <option value="0">January</option>
          <option value="1">February</option>
          <option value="2">March</option>
          <option value="3">April</option>
          <option value="4">May</option>
          <option value="5">June</option>
          <option value="6">July</option>
          <option value="7">August</option>
          <option value="8">September</option>
          <option value="9">October</option>
          <option value="10">November</option>
          <option value="11">December</option>
        </select>
      </div>
      <button class="bs-btn" onclick="confirmNewPage()">Create page</button>
    </div>
  </div>
</div>

<!-- ACTIONS SHEET -->
<div class="modal-bg" id="actions-modal" onclick="if(event.target===this)closeActions()">
  <div class="bottom-sheet">
    <div class="bs-handle"></div>
    <div class="a-item" onclick="dupPage();closeActions()">
      <div class="a-ico">⎘</div><div class="a-lbl">Duplicate this page</div>
    </div>
    <div class="a-div"></div>
    <div class="a-item" onclick="exportData();closeActions()">
      <div class="a-ico">↓</div><div class="a-lbl">Export backup (JSON)</div>
    </div>
    <div class="a-item" onclick="document.getElementById('imp-file').click();closeActions()">
      <div class="a-ico">↑</div><div class="a-lbl">Import backup</div>
    </div>
    <div class="a-div"></div>
    <div class="a-item" onclick="delPage();closeActions()">
      <div class="a-ico">×</div><div class="a-lbl danger">Delete this page</div>
    </div>
  </div>
</div>

<!-- SEARCH -->
<div id="search-ov">
  <div class="s-close" onclick="closeSearch()">Close ×</div>
  <div class="s-box">
    <div class="s-icon">↳</div>
    <input type="text" id="s-field" placeholder="Search entries, months, titles…"
      oninput="doSearch(this.value)" autocomplete="off" autocorrect="off">
  </div>
  <div id="s-results"></div>
</div>

<input type="file" id="imp-file" accept=".json" style="display:none" onchange="handleImport(event)">
<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════
   CONSTANTS & UTILS
═══════════════════════════════════════ */
const DB_NAME = 'futurelog';
const DB_VER  = 1;
const ST_NAME = 'state';
const ST_KEY  = 'db';
const DKKEY   = 'futurelog_dark';
const MONTHS  = ['January','February','March','April','May','June',
                 'July','August','September','October','November','December'];

function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}
function esc(s){return s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function autoH(ta){ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2100);}
const pageW=()=>Math.min(window.innerWidth,680);

/* ═══════════════════════════════════════
   DARK MODE  (preference stays in localStorage)
═══════════════════════════════════════ */
function applyDark(on){
  document.documentElement.toggleAttribute('data-dark',on);
  document.getElementById('dark-btn').textContent=on?'○':'☽';
}
function toggleDark(){
  const on=!document.documentElement.hasAttribute('data-dark');
  localStorage.setItem(DKKEY,on?'1':'');
  applyDark(on);
}
applyDark(localStorage.getItem(DKKEY)==='1');

/* ═══════════════════════════════════════
   INDEXED DB
═══════════════════════════════════════ */
let _idb = null;

function openIDB(){
  if(_idb) return Promise.resolve(_idb);
  return new Promise((resolve, reject)=>{
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const idb = e.target.result;
      if(!idb.objectStoreNames.contains(ST_NAME)) idb.createObjectStore(ST_NAME);
    };
    req.onsuccess = e => { _idb = e.target.result; resolve(_idb); };
    req.onerror   = e => reject(e.target.error);
    req.onblocked = () => reject(new Error('IDB blocked'));
  });
}

async function idbLoad(){
  const idb = await openIDB();
  return new Promise((resolve, reject)=>{
    const txn = idb.transaction(ST_NAME,'readonly');
    const req  = txn.objectStore(ST_NAME).get(ST_KEY);
    req.onsuccess = e => resolve(e.target.result||null);
    req.onerror   = e => reject(e.target.error);
  });
}

/* All IDB ops after the await are synchronous — avoids iOS Safari idle-tx abort */
async function idbSave(data){
  const idb = await openIDB();
  return new Promise((resolve, reject)=>{
    const txn = idb.transaction(ST_NAME,'readwrite');
    txn.objectStore(ST_NAME).put(data, ST_KEY);
    txn.oncomplete = () => resolve();
    txn.onerror    = e  => reject(e.target.error);
    txn.onabort    = ()  => reject(new Error('IDB tx aborted'));
  });
}

/* ── localStorage fallback (if IDB unavailable) ── */
let useFallback = false;
const LS_LEGACY = 'futurelog_v4';

/* ── debounced auto-save (2 s) ── */
let saveTimer = null;
function schedSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    if(useFallback){ lsSave(); return; }
    idbSave(db).catch(err=>console.error('IDB save failed',err));
  }, 2000);
}

/* ═══════════════════════════════════════
   DATA MODEL
   page = { id, title, startMonth (0-11), cells[] }
   cells are always MONTHS[startMonth..11]
   one year per page: 12 - startMonth cells
═══════════════════════════════════════ */
function newPage(title, startMonth){
  const si = (startMonth==null) ? new Date().getMonth() : startMonth;
  const cells = [];
  for(let m = si; m < 12; m++){
    cells.push({id:uid(), month:MONTHS[m], monthIdx:m, items:[]});
  }
  return {id:uid(), title:title||'', startMonth:si, cells};
}
function newItem(text){return{id:uid(),text:text||'',done:false};}

function isValidDB(d){
  return d && d.pages && d.pages.length &&
    d.pages[0].cells && d.pages[0].cells.length &&
    d.pages[0].cells[0].monthIdx != null;
}

let db = null;
let curPage = 0;

/* ═══════════════════════════════════════
   ROW HEIGHT SYNC via ResizeObserver
   Both cells in each row are set to the
   same min-height (the taller of the two,
   with 320px floor).
═══════════════════════════════════════ */
let rowObserver = null;

function initRowSync(pageEl, page){
  // Clean up previous observer if any
  if(rowObserver) rowObserver.disconnect();

  const grid = pageEl.querySelector('.month-grid');
  if(!grid) return;

  function syncRows(){
    const cells = Array.from(grid.querySelectorAll('.month-cell'));
    // Reset first so natural height can be measured
    cells.forEach(c=>c.style.minHeight='');
    // Pair up and equalise
    for(let i=0;i<cells.length;i+=2){
      const a=cells[i], b=cells[i+1];
      if(!a) continue;
      const ha = a.scrollHeight || a.getBoundingClientRect().height;
      const hb = b ? (b.scrollHeight || b.getBoundingClientRect().height) : 0;
      const rowH = Math.max(ha, hb, 320);
      a.style.minHeight = rowH+'px';
      if(b) b.style.minHeight = rowH+'px';
    }
  }

  rowObserver = new ResizeObserver(syncRows);
  // Observe every cell so any height change triggers sync
  grid.querySelectorAll('.month-cell').forEach(c => rowObserver.observe(c));
  // Also observe each textarea
  grid.querySelectorAll('textarea').forEach(ta => rowObserver.observe(ta));

  // Initial sync
  requestAnimationFrame(syncRows);
}

/* ═══════════════════════════════════════
   RENDER
═══════════════════════════════════════ */
function render(){renderDots();renderSlider();goTo(curPage,false);}

function renderDots(){
  document.getElementById('page-nav').innerHTML = db.pages.map((_,i)=>
    `<div class="pdot${i===curPage?' on':''}" onclick="goTo(${i})"></div>`).join('');
}

function renderSlider(){
  const sl = document.getElementById('pages-slider');
  sl.style.width = (db.pages.length*pageW())+'px';
  sl.innerHTML = db.pages.map((p,pi)=>pageHTML(p,pi)).join('');
  // Init textareas and row sync for each page
  requestAnimationFrame(()=>{
    document.querySelectorAll('textarea.item-ta').forEach(ta=>autoH(ta));
    db.pages.forEach((p,pi)=>{
      const pageEl = document.getElementById('lp-'+p.id);
      if(pageEl) initRowSync(pageEl, p);
    });
  });
}

function pageHTML(p,pi){
  const pw = pageW();
  const numCells = p.cells.length;
  const cells = p.cells.map((c,ci)=>{
    const isLast = ci >= numCells-2; // last row = last 2 cells
    return cellHTML(p,c,ci,pi,isLast);
  }).join('');

  // Sub-label: e.g. "March – December"
  const first = p.cells[0]?.month || '';
  const last  = p.cells[p.cells.length-1]?.month || '';
  const span  = first===last ? first : `${first} – ${last}`;

  return `<div class="log-page" style="width:${pw}px" id="lp-${p.id}">
    <div class="sheet" id="sheet-${p.id}">
      <div class="title-row">
        <span class="title-lbl">Title</span>
        <input class="title-inp" placeholder="${esc(span)}" value="${esc(p.title)}"
          onchange="setTitle(${pi},this.value)" onblur="setTitle(${pi},this.value)">
      </div>
      <div class="month-grid" id="grid-${p.id}">${cells}</div>
      <div class="pg-num">${pi+1} / ${db.pages.length} · ${esc(span)}</div>
    </div>
  </div>`;
}

function cellHTML(p,cell,ci,pi,isLast){
  const items = cell.items.map((item,ii)=>itemHTML(item,pi,ci,ii)).join('');
  return `<div class="month-cell${isLast?' last-row':''}" id="mc-${cell.id}">
    <div class="month-hdr">
      <span class="month-lbl">Month</span>
      <input class="month-inp" value="${esc(cell.month)}" placeholder="—"
        onchange="setMonth(${pi},${ci},this.value)" onblur="setMonth(${pi},${ci},this.value)">
    </div>
    <ul class="items-ul" id="ul-${cell.id}">${items}</ul>
    <button class="add-btn" onclick="addItem(${pi},${ci})">
      <span class="add-plus">+</span>
      <span class="add-txt">Add entry</span>
    </button>
  </div>`;
}

function itemHTML(item,pi,ci,ii){
  return `<li class="item-li${item.done?' done':''}" id="li-${item.id}">
    <div class="bullet-wrap" onclick="toggleDone(${pi},${ci},${ii})"><div class="bdot"></div></div>
    <textarea class="item-ta" rows="1" placeholder="Entry…"
      onchange="setItemText(${pi},${ci},${ii},this.value)"
      onblur="setItemText(${pi},${ci},${ii},this.value)"
      oninput="autoH(this)"
      onkeydown="itemKey(event,${pi},${ci},${ii})"
    >${esc(item.text)}</textarea>
    <button class="del-btn" onclick="delItem(${pi},${ci},${ii})">×</button>
  </li>`;
}

/* ═══════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════ */
function goTo(idx,anim=true){
  if(idx<0||idx>=db.pages.length) return;
  curPage=idx;
  const sl=document.getElementById('pages-slider');
  if(!anim){sl.style.transition='none';}
  sl.style.transform=`translateX(-${idx*pageW()}px)`;
  if(!anim) requestAnimationFrame(()=>{sl.style.transition='';});
  document.querySelectorAll('.pdot').forEach((d,i)=>d.classList.toggle('on',i===idx));
  document.querySelectorAll('.pg-num').forEach((el,i)=>{
    const p=db.pages[i];
    const first=p.cells[0]?.month||'';
    const last=p.cells[p.cells.length-1]?.month||'';
    const span=first===last?first:`${first} – ${last}`;
    el.textContent=`${i+1} / ${db.pages.length} · ${span}`;
  });
  // Re-init row sync for visible page
  const pageEl=document.getElementById('lp-'+db.pages[idx].id);
  if(pageEl) initRowSync(pageEl, db.pages[idx]);
}

/* SWIPE */
let tx=0,ty=0,sw=false;
document.getElementById('pages-track').addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;sw=false;},{passive:true});
document.getElementById('pages-track').addEventListener('touchmove',e=>{const dx=e.touches[0].clientX-tx,dy=e.touches[0].clientY-ty;if(!sw&&Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>12)sw=true;},{passive:true});
document.getElementById('pages-track').addEventListener('touchend',e=>{if(!sw)return;const dx=e.changedTouches[0].clientX-tx;if(dx<-50)goTo(curPage+1);else if(dx>50)goTo(curPage-1);sw=false;},{passive:true});

/* ═══════════════════════════════════════
   DATA MUTATIONS
═══════════════════════════════════════ */
function setTitle(pi,v){db.pages[pi].title=v;schedSave();}
function setMonth(pi,ci,v){db.pages[pi].cells[ci].month=v;schedSave();}
function setItemText(pi,ci,ii,v){db.pages[pi].cells[ci].items[ii].text=v;schedSave();}

function toggleDone(pi,ci,ii){
  const item=db.pages[pi].cells[ci].items[ii];
  item.done=!item.done;schedSave();
  const li=document.getElementById('li-'+item.id);
  if(li)li.classList.toggle('done',item.done);
}

function addItem(pi,ci){
  const item=newItem('');
  db.pages[pi].cells[ci].items.push(item);schedSave();
  const cell=db.pages[pi].cells[ci];
  const ul=document.getElementById('ul-'+cell.id);
  if(!ul)return;
  const ii=cell.items.length-1;
  const li=document.createElement('li');
  li.className='item-li';li.id='li-'+item.id;
  li.innerHTML=`<div class="bullet-wrap" onclick="toggleDone(${pi},${ci},${ii})"><div class="bdot"></div></div>
    <textarea class="item-ta" rows="1" placeholder="Entry…"
      onchange="setItemText(${pi},${ci},${ii},this.value)"
      onblur="setItemText(${pi},${ci},${ii},this.value)"
      oninput="autoH(this)"
      onkeydown="itemKey(event,${pi},${ci},${ii})"
    ></textarea>
    <button class="del-btn" onclick="delItem(${pi},${ci},${ii})">×</button>`;
  ul.appendChild(li);
  const ta=li.querySelector('textarea');ta.focus();autoH(ta);
}

function delItem(pi,ci,ii){
  db.pages[pi].cells[ci].items.splice(ii,1);schedSave();
  reRenderCell(pi,ci);
}

function itemKey(e,pi,ci,ii){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addItem(pi,ci);}
  if(e.key==='Backspace'&&e.target.value===''){e.preventDefault();delItem(pi,ci,ii);}
}

function reRenderCell(pi,ci){
  const p=db.pages[pi], cell=p.cells[ci];
  const old=document.getElementById('mc-'+cell.id);
  if(!old)return;
  const isLast=ci>=p.cells.length-2;
  const wrap=document.createElement('div');
  wrap.innerHTML=cellHTML(p,cell,ci,pi,isLast);
  const fresh=wrap.firstChild;
  old.parentNode.replaceChild(fresh,old);
  fresh.querySelectorAll('textarea').forEach(ta=>autoH(ta));
  // re-register new textareas with observer
  if(rowObserver) fresh.querySelectorAll('textarea').forEach(ta=>rowObserver.observe(ta));
}

/* ═══════════════════════════════════════
   PAGE ACTIONS
═══════════════════════════════════════ */
function openNewPage(){
  // Default starting month: month after last cell of current page, or Jan
  const cur = db.pages[curPage];
  const lastMonthIdx = cur.cells[cur.cells.length-1]?.monthIdx ?? 11;
  const nextMonth = lastMonthIdx >= 11 ? 0 : lastMonthIdx+1;
  document.getElementById('np-month').value = nextMonth;
  document.getElementById('np-title').value = '';
  document.getElementById('new-page-modal').classList.add('open');
  setTimeout(()=>document.getElementById('np-title').focus(),300);
}
function closeNewPage(){document.getElementById('new-page-modal').classList.remove('open');}

function confirmNewPage(){
  const title  = document.getElementById('np-title').value.trim();
  const startM = parseInt(document.getElementById('np-month').value,10);
  const page   = newPage(title, startM);
  db.pages.splice(curPage+1,0,page);
  schedSave();
  closeNewPage();
  renderSlider();renderDots();
  setTimeout(()=>goTo(curPage+1),50);
  showToast('Page added · '+MONTHS[startM]+' – December');
}

function dupPage(){
  const copy=JSON.parse(JSON.stringify(db.pages[curPage]));
  copy.id=uid();copy.title=copy.title?(copy.title+' (copy)'):'';
  copy.cells.forEach(c=>{c.id=uid();c.items.forEach(i=>i.id=uid());});
  db.pages.splice(curPage+1,0,copy);schedSave();
  renderSlider();renderDots();
  setTimeout(()=>goTo(curPage+1),50);
  showToast('Page duplicated');
}

function delPage(){
  if(db.pages.length<=1){showToast('Cannot delete the last page');return;}
  if(!confirm('Delete this page and all its entries?'))return;
  if(rowObserver){rowObserver.disconnect();rowObserver=null;}
  db.pages.splice(curPage,1);schedSave();
  if(curPage>=db.pages.length)curPage=db.pages.length-1;
  renderSlider();renderDots();goTo(curPage,false);
  showToast('Page deleted');
}

/* ═══════════════════════════════════════
   SEARCH
═══════════════════════════════════════ */
function openSearch(){document.getElementById('search-ov').classList.add('open');setTimeout(()=>document.getElementById('s-field').focus(),180);}
function closeSearch(){document.getElementById('search-ov').classList.remove('open');document.getElementById('s-field').value='';document.getElementById('s-results').innerHTML='';}
function doSearch(q){
  const res=document.getElementById('s-results');
  if(!q.trim()){res.innerHTML='';return;}
  const ql=q.toLowerCase(),hits=[];
  db.pages.forEach((p,pi)=>{
    if(p.title&&p.title.toLowerCase().includes(ql))hits.push({pi,type:'title',page:p});
    p.cells.forEach((c,ci)=>{
      if(c.month&&c.month.toLowerCase().includes(ql))hits.push({pi,ci,type:'month',page:p,cell:c});
      c.items.forEach((item,ii)=>{if(item.text&&item.text.toLowerCase().includes(ql))hits.push({pi,ci,ii,type:'item',page:p,cell:c,item});});
    });
  });
  if(!hits.length){res.innerHTML=`<div class="s-empty">Nothing found for "${esc(q)}"</div>`;return;}
  const hi=t=>t.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'),'<mark>$1</mark>');
  res.innerHTML=hits.slice(0,50).map(h=>{
    let meta='',text='';
    if(h.type==='title'){meta=`<span>Page ${h.pi+1}</span><span>Title</span>`;text=hi(esc(h.page.title));}
    else if(h.type==='month'){meta=`<span>Page ${h.pi+1}</span><span>${esc(h.page.title||'Untitled')}</span><span>Month</span>`;text=hi(esc(h.cell.month));}
    else{meta=`<span>Page ${h.pi+1}</span><span>${esc(h.page.title||'Untitled')}</span><span>${esc(h.cell.month)}</span>`;text=hi(esc(h.item.text));}
    return `<div class="s-res" onclick="closeSearch();goTo(${h.pi})"><div class="s-meta">${meta}</div><div class="s-text">${text}</div></div>`;
  }).join('');
}

/* ═══════════════════════════════════════
   ACTIONS SHEET
═══════════════════════════════════════ */
function openActions(){document.getElementById('actions-modal').classList.add('open');}
function closeActions(){document.getElementById('actions-modal').classList.remove('open');}

/* ═══════════════════════════════════════
   EXPORT / IMPORT
═══════════════════════════════════════ */
function getExportFilename(){
  const date = new Date().toISOString().split('T')[0];
  const key  = 'futurelog_export_'+date;
  const n    = (parseInt(localStorage.getItem(key)||'0',10)||0)+1;
  localStorage.setItem(key,n);
  return `futurelog-${date}-v${n}.json`;
}

function exportData(){
  const b=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  const u=URL.createObjectURL(b);
  const a=document.createElement('a');
  a.href=u;a.download=getExportFilename();
  a.click();URL.revokeObjectURL(u);showToast('Backup exported');
}

function handleImport(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=async ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(!d.pages) throw new Error('Invalid format');
      db=d;
      clearTimeout(saveTimer);
      if(useFallback){ lsSave(); }
      else { await idbSave(db); }
      curPage=0;render();showToast('Import successful');
    } catch{showToast('Import failed');}
  };
  r.readAsText(file);e.target.value='';
}

/* ═══════════════════════════════════════
   PRINT — inject repeated headers
═══════════════════════════════════════ */
window.addEventListener('beforeprint',()=>{
  document.querySelectorAll('.month-cell').forEach(cell=>{
    const ul=cell.querySelector('.items-ul');
    const monthVal=cell.querySelector('.month-inp')?.value||'';
    if(!ul||!monthVal)return;
    const items=Array.from(ul.querySelectorAll('.item-li'));
    items.forEach((li,i)=>{
      if(i>0&&i%14===0){
        const rpt=document.createElement('li');
        rpt.className='print-rpt';
        rpt.style.cssText='display:none;list-style:none;padding:10px 0 7px;margin-bottom:6px;border-bottom:.5px solid #ccc;font-family:DM Mono,monospace;font-size:7.5px;letter-spacing:.22em;text-transform:uppercase;color:#8a8782;';
        rpt.textContent='Month  '+monthVal.toUpperCase()+'  (cont.)';
        rpt.dataset.printHdr='1';
        ul.insertBefore(rpt,li);
      }
    });
  });
});
window.addEventListener('afterprint',()=>{
  document.querySelectorAll('[data-print-hdr]').forEach(el=>el.remove());
});

/* ═══════════════════════════════════════
   RESIZE
═══════════════════════════════════════ */
window.addEventListener('resize',()=>{
  const sl=document.getElementById('pages-slider');
  const pw=pageW();
  sl.style.width=(db.pages.length*pw)+'px';
  document.querySelectorAll('.log-page').forEach(p=>p.style.width=pw+'px');
  goTo(curPage,false);
});

/* ═══════════════════════════════════════
   INIT — load from IndexedDB; fall back to localStorage
═══════════════════════════════════════ */
(async ()=>{
  let loaded = null;
  try {
    loaded = await idbLoad();
  } catch(err){
    console.warn('IndexedDB unavailable, falling back to localStorage:', err);
    useFallback = true;
    showToast('Storage unavailable — using local fallback');
    loaded = lsLoad();
  }

  if(isValidDB(loaded)){
    db = loaded;
  } else {
    // Migrate from legacy localStorage if present
    const legacy = lsLoad();
    if(isValidDB(legacy)){
      db = legacy;
      if(!useFallback) idbSave(db).catch(e=>console.error('IDB migration failed',e));
    } else {
      // Fresh install — seed with sample entries
      db = {pages:[newPage('My Future Log', new Date().getMonth())]};
      const c = db.pages[0].cells[0];
      c.items = [
        newItem('Application for residency due on the 15th'),
        newItem('Check if gallery is accepting submissions'),
        newItem('Deliver paintings to collector'),
        newItem('Plan trip to Spain'),
      ];
      if(useFallback){ lsSave(); }
      else { idbSave(db).catch(e=>console.error('IDB seed failed',e)); }
    }
  }

  render();
})();
</script>
