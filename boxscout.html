<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BoxScout — Auth</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f5;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .auth-container {
    background: white;
    padding: 40px;
    border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    max-width: 400px;
    width: 100%;
  }
  h1 {
    font-size: 20px;
    margin-bottom: 8px;
    color: #333;
  }
  .subtitle {
    font-size: 13px;
    color: #888;
    margin-bottom: 28px;
  }
  input {
    width: 100%;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 14px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  input:focus {
    outline: none;
    border-color: #333;
  }
  button {
    width: 100%;
    padding: 12px;
    background: #333;
    color: white;
    border: none;
    border-radius: 4px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover {
    background: #555;
  }
  button:active {
    background: #222;
  }
  .error {
    color: #cc0000;
    font-size: 12px;
    margin-bottom: 16px;
    padding: 8px;
    background: #ffe8e8;
    border-radius: 4px;
    display: none;
  }
  .error.show {
    display: block;
  }
</style>
</head>
<body>

<div class="auth-container">
  <h1>BoxScout</h1>
  <p class="subtitle">Enter passphrase to continue</p>
  <div class="error" id="error"></div>
  <input 
    type="password" 
    id="pass" 
    placeholder="Passphrase" 
    autocomplete="off"
    onkeydown="if(event.key==='Enter')authenticate()"
  >
  <button onclick="authenticate()">Unlock</button>
</div>

<script>
  // Check if already authenticated in this session
  if (sessionStorage.getItem('boxscout_auth') === 'verified') {
    loadApp();
  }

  function authenticate() {
    const pass = document.getElementById('pass').value;
    const error = document.getElementById('error');
    
    // CHANGE THIS PASSPHRASE — use something strong and unique
    const CORRECT_PASS = 'boxscout2026';
    
    if (pass === CORRECT_PASS) {
      sessionStorage.setItem('boxscout_auth', 'verified');
      loadApp();
    } else {
      error.textContent = 'Incorrect passphrase. Try again.';
      error.classList.add('show');
      document.getElementById('pass').value = '';
      document.getElementById('pass').focus();
    }
  }

  function loadApp() {
    // Replace current page with the actual BoxScout app
    window.location.href = 'boxscout-app.html';
  }

  // Focus on input immediately
  document.getElementById('pass').focus();
</script>

</body>
</html>
